position: Producing
description: >-
  Jito Labs is the Solana MEV infrastructure company behind Jito-Solana, the MEV-enabled validator client that runs on
  the majority of Solana mainnet stake, and the Jito Block Engine, an off-chain auction service that accepts bundles and
  transactions from searchers and forwards them to the next leader. Together with the Jito Foundation it stewards
  JitoSOL — Solana's largest MEV-aware liquid staking token — the StakeNet validator scoring system, the Jito Restaking
  and Vault programs that power Node Consensus Networks, the merkle-based token distributor used for airdrops, and the
  JTO governance token. Developer surfaces include a JSON-RPC API for bundle and transaction submission, a public REST
  tip floor and WebSocket tip stream for pricing, the ShredStream gRPC service for sub-slot Solana shreds, and the open
  mev-protos repository that defines the canonical Auth, Block Engine, Bundle, Packet, Relayer, Searcher, Shared, and
  ShredStream gRPC interfaces — with official SDKs in TypeScript, Python, Rust, and Go.
