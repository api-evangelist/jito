apis:
  - aid: jito:jito-block-engine
    name: Jito Block Engine JSON-RPC API
    tags:
      - Solana
      - MEV
      - Bundles
      - Block Engine
    humanURL: https://docs.jito.wtf/lowlatencytxnsend
    baseURL: https://mainnet.block-engine.jito.wtf/api/v1/bundles
    properties:
      - url: https://docs.jito.wtf/lowlatencytxnsend
        type: Documentation
      - url: https://github.com/jito-labs/mev-protos/blob/master/json_rpc/http.md
        type: APIReference
      - url: openapi/jito-block-engine-openapi.yml
        type: OpenAPI
      - url: json-schema/jito-bundle-schema.json
        type: JSONSchema
      - url: json-schema/jito-bundle-status-schema.json
        type: JSONSchema
      - url: json-structure/jito-bundle-structure.json
        type: JSONStructure
      - url: json-structure/jito-bundle-status-structure.json
        type: JSONStructure
      - url: examples/jito-sendBundle-example.json
        type: Example
      - url: examples/jito-sendBundle-response-example.json
        type: Example
      - url: examples/jito-getBundleStatuses-example.json
        type: Example
      - url: examples/jito-getTipAccounts-example.json
        type: Example
    description: >-
      JSON-RPC API for submitting atomic bundles of up to five Solana transactions to the Jito Block Engine via
      sendBundle, plus getBundleStatuses, getInflightBundleStatuses, getTipAccounts, getRandomTipAccount, and a
      sendTransaction proxy. Endpoints are exposed from regional Block Engine clusters in Amsterdam, Dublin, Frankfurt,
      London, New York, Salt Lake City, Singapore, Tokyo, and global mainnet and testnet front-doors.
  - aid: jito:jito-bundles-tip-floor
    name: Jito Bundles Tip Floor API
    tags:
      - Solana
      - MEV
      - Tips
      - Pricing
    humanURL: https://bundles.jito.wtf/api/v1/bundles/tip_floor
    baseURL: https://bundles.jito.wtf
    properties:
      - url: https://docs.jito.wtf/lowlatencytxnsend
        type: Documentation
      - url: openapi/jito-bundles-tip-floor-openapi.yml
        type: OpenAPI
      - url: json-schema/jito-tip-floor-schema.json
        type: JSONSchema
      - url: examples/jito-tip-floor-example.json
        type: Example
    description: >-
      Public REST endpoint exposing the recent tip floor — landed-tips percentiles (25th/50th/75th/95th/99th plus EMA50)
      — used by searchers to size the SOL tip on sendBundle. Pairs with the tip_stream WebSocket for continuous updates.
  - aid: jito:jito-streaming
    name: Jito Streaming Surfaces
    tags:
      - Solana
      - MEV
      - Streaming
      - ShredStream
      - WebSocket
      - gRPC
    humanURL: https://github.com/jito-labs/shredstream-proxy
    properties:
      - url: https://github.com/jito-labs/shredstream-proxy
        type: Documentation
      - url: https://github.com/jito-labs/mev-protos/blob/master/shredstream.proto
        type: APIReference
      - url: asyncapi/jito-streaming-asyncapi.yml
        type: AsyncAPI
    description: >-
      Real-time streaming surfaces from Jito infrastructure — the wss tip_stream for continuous bundle-tip percentile
      updates, the ShredstreamProxy SubscribeEntries gRPC method for sub-slot Solana shred delivery, and the
      SearcherService SubscribeBundleResults gRPC stream of bundle inclusion and rejection events.
  - aid: jito:jito-searcher-grpc
    name: Jito Searcher gRPC Service
    tags:
      - Solana
      - MEV
      - gRPC
      - Searcher
    humanURL: https://github.com/jito-labs/mev-protos/blob/master/searcher.proto
    properties:
      - url: https://github.com/jito-labs/mev-protos/blob/master/searcher.proto
        type: APIReference
      - url: https://github.com/jito-labs/mev-protos/blob/master/auth.proto
        type: APIReference
      - url: https://github.com/jito-labs/searcher-examples
        type: CodeExamples
    description: >-
      gRPC SearcherService exposing SubscribeBundleResults, SendBundle, GetNextScheduledLeader, GetConnectedLeaders,
      GetConnectedLeadersRegioned, GetTipAccounts, and GetRegions. Authenticated via the AuthService challenge +
      token-refresh flow. The native interface used by Jito's official Rust, TypeScript, Python, and Go searcher
      clients.
  - aid: jito:jito-block-engine-validator-grpc
    name: Jito Block Engine Validator gRPC
    tags:
      - Solana
      - MEV
      - gRPC
      - Validator
    humanURL: https://github.com/jito-labs/mev-protos/blob/master/block_engine.proto
    properties:
      - url: https://github.com/jito-labs/mev-protos/blob/master/block_engine.proto
        type: APIReference
      - url: https://github.com/jito-foundation/jito-solana
        type: Repository
      - url: https://github.com/jito-foundation/jito-relayer
        type: Repository
    description: >-
      gRPC interface between Jito-Solana validators / relayers and the Block Engine — BlockEngineValidator with
      SubscribePackets, SubscribeBundles, GetBlockBuilderFeeInfo, GetBlockEngineEndpoints, and BlockEngineRelayer with
      SubscribeAccountsOfInterest, SubscribeProgramsOfInterest, and StartExpiringPacketStream.
  - aid: jito:jito-relayer-grpc
    name: Jito Relayer gRPC
    tags:
      - Solana
      - Relayer
      - gRPC
      - Validator
    humanURL: https://github.com/jito-foundation/jito-relayer
    properties:
      - url: https://github.com/jito-foundation/jito-relayer
        type: Repository
      - url: https://github.com/jito-labs/mev-protos/blob/master/relayer.proto
        type: APIReference
    description: >-
      Relayer gRPC service that sits in front of a Jito-Solana validator, exposing GetTpuConfigs and SubscribePackets so
      the validator can receive deduplicated packets from the Block Engine and the public TPU.
  - aid: jito:jitosol-stake-pool
    name: JitoSOL Stake Pool
    tags:
      - Solana
      - Liquid Staking
      - JitoSOL
      - MEV
    humanURL: https://www.jito.network/stakers/
    properties:
      - url: https://www.jito.network/stakers/
        type: Documentation
      - url: https://github.com/jito-foundation/stake-pool
        type: Repository
      - url: https://github.com/jito-foundation/spl-stake-pool-js
        type: SDK
      - url: https://github.com/jito-foundation/stakenet
        type: Repository
      - url: json-schema/jito-jitosol-stake-schema.json
        type: JSONSchema
    description: >-
      JitoSOL — Solana's MEV-aware liquid staking token, backed by an instance of the SPL Stake Pool program. Deposit
      SOL or an existing stake account to receive JitoSOL whose exchange rate accrues both staking rewards and the
      validator set's share of MEV captured by the Block Engine. StakeNet drives validator selection on chain.
  - aid: jito:jito-restaking
    name: Jito Restaking And Vaults
    tags:
      - Solana
      - Restaking
      - Vaults
      - NCN
    humanURL: https://github.com/jito-foundation/restaking
    properties:
      - url: https://github.com/jito-foundation/restaking
        type: Repository
      - url: https://github.com/jito-foundation/jito-tip-router
        type: Repository
      - url: https://github.com/jito-foundation/jito-rewards-ncn
        type: Repository
      - url: https://github.com/jito-foundation/ncn-template
        type: Repository
      - url: https://github.com/jito-foundation/jito-bls-ncn
        type: Repository
      - url: json-schema/jito-ncn-schema.json
        type: JSONSchema
    description: >-
      Jito Restaking — the on-chain program suite (Restaking + Vault) that lets SPL tokens be restaked into Vaults whose
      security is rented to NCNs (Node Consensus Networks). Includes the tip router, the rewards NCN that distributes
      payment to other NCNs, an NCN template, and a BLS NCN reference implementation.
  - aid: jito:jito-foundation-governance
    name: Jito Foundation Governance
    tags:
      - Solana
      - Governance
      - JTO
      - DAO
    humanURL: https://gov.jito.network
    properties:
      - url: https://gov.jito.network
        type: Portal
      - url: https://github.com/jito-foundation/governance-ui
        type: Repository
      - url: https://github.com/jito-foundation/distributor
        type: Repository
    description: >-
      Jito DAO governance — JTO token holders direct treasury, fee parameters, and the JitoSOL validator selection
      policy through Realms. Includes the Jito Realms governance UI fork and the merkle-based token distributor used for
      airdrops and reward distribution.
  - aid: jito:jito-solana
    name: Jito-Solana Validator Client
    tags:
      - Solana
      - Validator
      - MEV
      - Rust
    humanURL: https://github.com/jito-foundation/jito-solana
    properties:
      - url: https://github.com/jito-foundation/jito-solana
        type: Repository
      - url: https://github.com/jito-foundation/jito-programs
        type: Repository
      - url: https://github.com/jito-foundation/jito-bell
        type: Repository
      - url: https://github.com/jito-labs/geyser-grpc-plugin
        type: Repository
      - url: https://github.com/jito-foundation/solana-accountsdb-connector
        type: Repository
    description: >-
      Jito-Solana — the Jito Foundation MEV-enabled fork of the Solana validator client. Adds the Block Engine / Relayer
      integration that makes the bundle auction possible at the validator layer. Ships alongside the Jito programs, the
      Geyser gRPC plugin for account streaming, the Jito Bell notification system, and an accountsdb connector.
